<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArtKart Admin</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#121212;color:white;display:flex}
.sidebar{width:220px;background:#1e1e1e;height:100vh;padding:20px}
.sidebar ul{list-style:none;padding:0}
.sidebar li{padding:12px;cursor:pointer;border-radius:6px;margin-bottom:8px;background:#2a2a2a}
.sidebar li:hover{background:#444}
.main{flex:1;padding:25px;overflow-y:auto;height:100vh}
.card{background:#1f1f1f;padding:15px;border-radius:10px;margin-bottom:15px}
.art-img{width:150px;border-radius:8px}
.delete{background:red;border:none;padding:8px 12px;color:white;border-radius:6px;cursor:pointer}
</style>
</head>
<body>

<div class="sidebar">
<h2>ArtKart Admin</h2>
<ul>
<li onclick="loadDashboard()">Dashboard</li>
<li onclick="loadArtworks()">Artworks</li>
<li onclick="loadUsers()">Users</li>
</ul>
</div>

<div class="main">
<div id="content">Loading...</div>
</div>

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCZ-QeZrs6qJlDk4ZMs9LP2iQ4wjJ2vcF8",
  authDomain: "artkart-69692.firebaseapp.com",
  projectId: "artkart-69692"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

async function initAdminPanel(user){
  try{
    const userDoc = await db.collection("users").doc(user.uid).get();
    if(!userDoc.exists || userDoc.data().role !== "admin"){
      alert("Access denied. Only admins allowed.");
      window.location.href = "/";
      return;
    }
    alert("Welcome Admin!");
    await loadDashboard();
  }catch(e){
    alert("Error loading admin panel: "+e.message);
  }
}

auth.onAuthStateChanged(user=>{
  if(!user){
    alert("Login required to access admin panel");
    window.location.href="/";
    return;
  }
  initAdminPanel(user);
});

// Load Dashboard
async function loadDashboard(){
  const artsSnap = await db.collection("artworks").get();
  const usersSnap = await db.collection("users").get();
  document.getElementById("content").innerHTML = `
    <h1>Dashboard</h1>
    <div class="card">Total Artworks: ${artsSnap.size}</div>
    <div class="card">Total Users: ${usersSnap.size}</div>
  `;
}

// Load Artworks
async function loadArtworks(){
  const snapshot = await db.collection("artworks").get();
  let html = "<h1>Artworks</h1>";
  if(snapshot.empty) html += "<p>No artworks found.</p>";
  snapshot.forEach(docSnap=>{
    const art = docSnap.data();
    html += `
    <div class="card">
      <img src="${art.imageURL || 'https://via.placeholder.com/150'}" class="art-img"><br>
      <b>${art.title || "Untitled"}</b><br>
      Artist: ${art.artistName || "Unknown"}<br>
      Price: ₹${art.price || 0}<br>
      Email: ${art.email || "—"}<br><br>
      <button class="delete" onclick="deleteArt('${docSnap.id}')">Delete</button>
    </div>
    `;
  });
  document.getElementById("content").innerHTML = html;
}

// Delete Artwork
function deleteArt(id){
  if(!confirm("Are you sure you want to delete this artwork?")) return;
  db.collection("artworks").doc(id).delete()
    .then(()=>{ alert("Artwork deleted successfully"); loadArtworks(); })
    .catch(err=>alert("Error deleting artwork: "+err.message));
}

// Load Users
async function loadUsers(){
  const snapshot = await db.collection("users").get();
  let html = "<h1>Users</h1>";
  if(snapshot.empty) html += "<p>No users found.</p>";
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    html += `
    <div class="card">
      ${data.name || "—"}<br>
      ${data.email || "—"}<br>
      Role: ${data.role || "user"}
    </div>
    `;
  });
  document.getElementById("content").innerHTML = html;
}
</script>

</body>
</html>
