<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ArtKart Admin</title>
<style>
  body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
display:flex;
}

.sidebar{
width:220px;
background:#1e1e1e;
height:100vh;
padding:20px;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
padding:12px;
cursor:pointer;
border-radius:6px;
margin-bottom:8px;
background:#2a2a2a;
}

.sidebar li:hover{
background:#444;
}

.main{
flex:1;
padding:25px;
}

.card{
background:#1f1f1f;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.art-img{
width:150px;
border-radius:8px;
}

.delete{
background:red;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>ArtKart Admin</h2>

<ul>
<li onclick="loadDashboard()">Dashboard</li>
<li onclick="loadArtworks()">Artworks</li>
<li onclick="loadUsers()">Users</li>
</ul>

</div>

<div class="main">

<div id="content"></div>

</div>

<script>
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "nickfury20baar@gmail.com";

onAuthStateChanged(auth,(user)=>{

if(!user || user.email !== ADMIN_EMAIL){
window.location.href="/";
return;
}

loadDashboard();

});

window.loadDashboard = async function(){

const snapshot = await getDocs(collection(db,"artworks"));

document.getElementById("content").innerHTML = `
<h1>Dashboard</h1>
<div class="card">Total Artworks: ${snapshot.size}</div>
`;

};

window.loadArtworks = async function(){

const snapshot = await getDocs(collection(db,"artworks"));

let html = "<h1>Artworks</h1>";

snapshot.forEach(docSnap=>{

const art = docSnap.data();

html += `
<div class="card">
<img src="${art.imageURL}" class="art-img"><br>
<b>${art.title}</b><br>
Artist: ${art.artistName}<br>
Price: ₹${art.price}<br>
Email: ${art.email}<br><br>

<button class="delete" onclick="deleteArt('${docSnap.id}')">Delete</button>
</div>
`;

});

document.getElementById("content").innerHTML = html;

};

window.deleteArt = async function(id){

await deleteDoc(doc(db,"artworks",id));

alert("Artwork deleted");

loadArtworks();

};

window.loadUsers = async function(){

const snapshot = await getDocs(collection(db,"users"));

let html = "<h1>Users</h1>";

snapshot.forEach(user=>{

const data = user.data();

html += `
<div class="card">
${data.email}
</div>
`;

});

document.getElementById("content").innerHTML = html;

};
</script>

</body>
</html>
